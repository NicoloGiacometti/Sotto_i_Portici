<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sotto i Portici</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0908;
      font-family: Georgia, serif;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
    }
    /* Crosshair minimo, utile finche' non c'e' UI vera */
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      margin: -3px 0 0 -3px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="crosshair"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
